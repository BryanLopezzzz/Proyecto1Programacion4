<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Puestos</title>
    <link rel="stylesheet" href="/css/estilos.css" th:href="@{/css/estilos.css}"/>
</head>
<body>
<nav>
    <div>
        <span class="brand">BolsaEmpleo</span>
        <a th:href="@{/empresa/dashboard}">Dashboard</a>
        <a th:href="@{/empresa/puestos}">Mis puestos</a>
        <a th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
    </div>
    <div><a th:href="@{/logout}">Salir</a></div>
</nav>
<div class="container">
    <div class="top-bar">
        <h2>Mis Puestos</h2>
        <a class="btn btn-primary" th:href="@{/empresa/puestos/nuevo}">+ Publicar nuevo puesto</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Descripción</th>
            <th>Salario</th>
            <th>Moneda</th>
            <th>Tipo</th>
            <th>Activo</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${puestos}">
            <td th:text="${p.id}"></td>
            <td th:text="${#strings.abbreviate(p.descripcion, 55)}"></td>
            <td th:text="${#numbers.formatDecimal(p.salario, 1, 'COMMA', 2, 'POINT')}"></td>
            <td th:text="${p.moneda.codigo}"></td>
            <td th:text="${p.tipo}"></td>
            <td>
                <span class="badge"
                      th:classappend="${p.activo} ? 'badge-activo' : 'badge-inactivo'"
                      th:text="${p.activo} ? 'Sí' : 'No'"></span>
            </td>
            <td>
                <form method="post" th:action="@{/empresa/puestos/desactivar/{id}(id=${p.id})}"
                      style="display:inline" th:if="${p.activo}">
                    <button type="submit" class="btn btn-secondary btn-sm">Desactivar</button>
                </form>
                <a class="btn btn-primary btn-sm"
                   th:href="@{/empresa/candidatos/buscar(puestoId=${p.id})}">
                    Buscar candidatos
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <p class="empty" th:if="${#lists.isEmpty(puestos)}">No has publicado puestos aún.</p>
</div>
<footer>
    <strong>Bolsa de Empleo</strong>
    <span>Contacto: info@bolsaempleo.local &nbsp;|&nbsp; Créditos: Equipo de desarrollo</span>
</footer>
</body>
</html>
