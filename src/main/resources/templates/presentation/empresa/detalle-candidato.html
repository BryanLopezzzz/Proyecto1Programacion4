<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Candidato</title>
    <link rel="stylesheet" href="/css/estilos.css" th:href="@{/css/estilos.css}"/>
</head>
<body>
<nav>
    <div>
        <span class="brand">BolsaEmpleo</span>
        <a th:href="@{/empresa/dashboard}">Dashboard</a>
        <a th:href="@{/empresa/puestos}">Mis puestos</a>
    </div>
    <div><a th:href="@{/logout}">Salir</a></div>
</nav>
<div class="container-narrow">
    <h2>Detalle de Oferente</h2>

    <div class="card">
        <h3 th:text="${oferente.nombre + ' ' + oferente.primerApellido}"></h3>
        <div class="info-row"><span class="lbl">Identificación:</span><span class="val" th:text="${oferente.identificacion}"></span></div>
        <div class="info-row"><span class="lbl">Email:</span><span class="val" th:text="${oferente.usuario.correo}"></span></div>
        <div class="info-row"><span class="lbl">Teléfono:</span><span class="val" th:text="${oferente.telefono}"></span></div>
        <div class="info-row"><span class="lbl">Residencia:</span><span class="val" th:text="${oferente.residencia}"></span></div>
        <div class="info-row"><span class="lbl">Nacionalidad:</span><span class="val" th:text="${oferente.nacionalidad}"></span></div>
    </div>

    <div class="card">
        <h3>Habilidades</h3>
        <table>
            <thead>
            <tr><th>Característica</th><th>Nivel</th></tr>
            </thead>
            <tbody>
            <tr th:each="h : ${habilidades}">
                <td th:text="${h.caracteristica.nombre}"></td>
                <td>
                    <span class="badge badge-activo"
                          th:text="${h.nivel == 1 ? 'Básico' : (h.nivel == 2 ? 'Intermedio' : 'Avanzado')}">
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
        <p class="empty" th:if="${#lists.isEmpty(habilidades)}">Sin habilidades registradas.</p>
    </div>

    <div th:if="${oferente.curriculumPdf != null}" style="margin-bottom:16px">
        <a class="btn btn-primary" th:href="@{/uploads/{f}(f=${oferente.curriculumPdf})}" target="_blank">
            Ver Currículo PDF
        </a>
    </div>

    <a class="btn btn-secondary" th:href="@{/empresa/puestos}">← Volver</a>
</div>
<footer>
    <strong>Bolsa de Empleo</strong>
    <span>Contacto: info@bolsaempleo.local &nbsp;|&nbsp; Créditos: Equipo de desarrollo</span>
</footer>
</body>
</html>
