<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Habilidades</title>
    <link rel="stylesheet" href="/css/estilos.css" th:href="@{/css/estilos.css}"/>
</head>
<body>
<nav>
    <div>
        <span class="brand">BolsaEmpleo</span>
        <a th:href="@{/oferente/dashboard}">Dashboard</a>
        <a th:href="@{/oferente/habilidades}">Mis habilidades</a>
        <a th:href="@{/oferente/cv}">Mi CV</a>
        <a th:href="@{/oferente/puestos}">Buscar puestos</a>
    </div>
    <div><a th:href="@{/logout}">Salir</a></div>
</nav>
<div class="container panels">

    <div class="card panel-left">
        <h2>Mis Habilidades</h2>
        <table th:if="${!#lists.isEmpty(habilidades)}">
            <thead>
            <tr><th>Característica</th><th>Nivel</th><th>Eliminar</th></tr>
            </thead>
            <tbody>
            <tr th:each="h : ${habilidades}">
                <td th:text="${h.caracteristica.nombre}"></td>
                <td>
                    <span class="badge badge-activo"
                          th:text="${h.nivel == 1 ? 'Básico' : (h.nivel == 2 ? 'Intermedio' : 'Avanzado')}">
                    </span>
                </td>
                <td>
                    <form method="post"
                          th:action="@{/oferente/habilidades/eliminar/{id}(id=${h.caracteristica.id})}">
                        <button type="submit" class="btn btn-outline btn-sm"> Eliminar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <p class="empty" th:if="${#lists.isEmpty(habilidades)}">No has registrado habilidades aún.</p>
    </div>

    <div class="card panel-right">
        <h3>Agregar Habilidad</h3>
        <form method="post" th:action="@{/oferente/habilidades/agregar}">
            <label>Característica</label>
            <select name="caracteristicaId" required>
                <option value="">-- Seleccione --</option>
                <th:block th:each="raiz : ${raices}">
                    <th:block th:if="${raiz.hijos != null && !raiz.hijos.isEmpty()}">
                        <optgroup th:label="${raiz.nombre}">
                            <th:block th:each="hijo : ${raiz.hijos}">
                                <th:block th:if="${hijo.hijos != null && !hijo.hijos.isEmpty()}">
                                    <option th:value="${hijo.id}"
                                            th:text="${hijo.nombre}">
                                    </option>
                                    <option th:each="nieto : ${hijo.hijos}"
                                            th:value="${nieto.id}"
                                            th:text="${'↳ ' + nieto.nombre}">
                                    </option>
                                </th:block>
                                <option th:if="${hijo.hijos == null || hijo.hijos.isEmpty()}"
                                        th:value="${hijo.id}"
                                        th:text="${hijo.nombre}">
                                </option>
                            </th:block>
                        </optgroup>
                    </th:block>
                    <option th:if="${raiz.hijos == null || raiz.hijos.isEmpty()}"
                            th:value="${raiz.id}"
                            th:text="${raiz.nombre}">
                    </option>
                </th:block>
            </select>

            <label>Nivel</label>
            <select name="nivel" required>
                <option value="1">Básico</option>
                <option value="2" selected>Intermedio</option>
                <option value="3">Avanzado</option>
            </select>

            <button type="submit" class="btn btn-primary" style="margin-top:16px">
                Agregar habilidad
            </button>
        </form>
    </div>

</div>
<footer>
    <strong>Bolsa de Empleo</strong>
    <span>Contacto: info@bolsaempleo.local | Créditos: Equipo de desarrollo</span>
</footer>
</body>
</html>
