<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Buscar Puestos</title>
    <link rel="stylesheet" href="/css/estilos.css" th:href="@{/css/estilos.css}"/>
</head>
<body>
<nav>
    <div>
        <span class="brand">BolsaEmpleo</span>
        <a th:href="@{/oferente/dashboard}">Dashboard</a>
        <a th:href="@{/oferente/habilidades}">Mis habilidades</a>
        <a th:href="@{/oferente/cv}">Mi CV</a>
        <a th:href="@{/oferente/puestos}">Buscar puestos</a>
    </div>
    <div><a th:href="@{/logout}">Salir</a></div>
</nav>
<div class="container-wide">
    <h2>Buscar Puestos Disponibles</h2>

    <form method="get" th:action="@{/oferente/puestos}">
        <div class="arbol">
            <div th:each="raiz : ${raices}">
                <label>
                    <input type="checkbox" name="caracteristicas" th:value="${raiz.id}"
                           th:checked="${seleccionadas != null && seleccionadas.contains(raiz.id)}"/>
                    <strong th:text="${raiz.nombre}"></strong>
                </label>
                <ul th:if="${raiz.hijos != null && !raiz.hijos.isEmpty()}">
                    <li th:each="hijo : ${raiz.hijos}">
                        <label>
                            <input type="checkbox" name="caracteristicas" th:value="${hijo.id}"
                                   th:checked="${seleccionadas != null && seleccionadas.contains(hijo.id)}"/>
                            <span th:text="${hijo.nombre}"></span>
                        </label>
                    </li>
                </ul>
            </div>
        </div>

        <div class="modo">
            <strong>Modo:</strong>
            <label>
                <input type="radio" name="modoTodos" value="true"
                       th:checked="${modoTodos != null && modoTodos}"/>
                Todos (AND)
            </label>
            <label>
                <input type="radio" name="modoTodos" value="false"
                       th:checked="${modoTodos == null || !modoTodos}"/>
                Cualquiera (OR)
            </label>
        </div>

        <div class="btns">
            <button type="submit" class="btn btn-primary">Buscar</button>
            <a class="btn btn-outline" th:href="@{/oferente/puestos}">Limpiar</a>
        </div>
    </form>

    <h3>Resultados</h3>
    <table th:if="${resultados != null && !#lists.isEmpty(resultados)}">
        <thead>
        <tr>
            <th>Empresa</th><th>Descripción</th><th>Salario</th>
            <th>Moneda</th><th>Tipo</th><th>Características</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${resultados}">
            <td th:text="${p.empresa.nombre}"></td>
            <td th:text="${#strings.abbreviate(p.descripcion, 60)}"></td>
            <td th:text="${#numbers.formatDecimal(p.salario, 1, 'COMMA', 2, 'POINT')}"></td>
            <td th:text="${p.moneda.codigo}"></td>
            <td>
                <span class="badge"
                      th:classappend="${p.tipo.name() == 'PUBLICO'} ? 'badge-publico' : 'badge-privado'"
                      th:text="${p.tipo}"></span>
            </td>
            <td>
                <span th:each="c, i : ${p.caracteristicas}"
                      th:text="${c.caracteristica.nombre
                                 + ' ('
                                 + (c.nivelRequerido == 1 ? 'Básico' : (c.nivelRequerido == 2 ? 'Intermedio' : 'Avanzado'))
                                 + ')'
                                 + (i.last ? '' : ', ')}">
                </span>
            </td>
        </tr>
        </tbody>
    </table>
    <p class="empty" th:if="${resultados == null || #lists.isEmpty(resultados)}">No se encontraron puestos.</p>
</div>
<footer>
    <strong>Bolsa de Empleo</strong>
    <span>Contacto: info@bolsaempleo.local | Créditos: Equipo de desarrollo</span>
</footer>
</body>
</html>
