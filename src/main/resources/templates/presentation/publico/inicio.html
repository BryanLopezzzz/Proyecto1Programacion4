<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Bolsa de Empleo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fdfafb;
            color: #2d0a0a;
        }

        nav {
            background: #4c0519;
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        nav .brand { color: #fff1f2; font-weight: 800; font-size: 20px; }
        nav a { color: #fecdd3; text-decoration: none; font-size: 13px; margin-left: 20px; }
        nav a:hover { color: #ffffff; }

        .container { padding: 40px 10%; }
        h1 { color: #4c0519; margin-bottom: 5px; font-size: 32px; font-weight: 900; }
        .subtitle { color: #9f1239; font-size: 14px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 0.5px; }

        .grid { display: flex; flex-wrap: wrap; gap: 20px; }

        .card {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            border-top: 5px solid #831843;
            border-radius: 12px;
            width: 290px;
            padding: 24px;
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }

        .card .company { font-weight: bold; color: #831843; font-size: 20px; margin-bottom: 6px; }
        .card .desc { font-size: 14px; color: #4c0519; opacity: 0.7; margin-bottom: 12px; }
        .salario { font-weight: 900; color: #4c0519; margin-bottom: 20px; display: block; font-size: 18px; }

        .btn-detail {
            display: block; text-align: center; padding: 10px;
            background: transparent; color: #831843;
            border: 2px solid #831843; border-radius: 8px;
            text-decoration: none; font-size: 13px; font-weight: 800;
            transition: 0.3s;
        }
        .btn-detail:hover { background: #831843; color: white; }
        .tooltip {
            display: none;
            position: absolute;
            top: 95%;
            left: 0;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            border: 1px solid rgba(131, 24, 67, 0.3);
            padding: 20px;
            border-radius: 12px;
            z-index: 100;
            width: 100%;
            box-shadow: 0 15px 30px rgba(76, 5, 25, 0.15);

            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover .tooltip { display: block; }

        footer { background: #4c0519; color: #fecdd3; padding: 30px 40px; margin-top: 60px; display: flex; justify-content: space-between; font-size: 12px; }
        footer strong { color: white; }
    </style>
</head>
<body>
<nav>
    <div>
        <span class="brand">BolsaEmpleo</span>
        <a th:href="@{/buscar}">Buscar puestos</a>
        <a th:href="@{/registro/empresa}">Registro Empresa</a>
        <a th:href="@{/registro/oferente}">Registro Oferente</a>
    </div>
    <div>
        <a th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>
        <a th:href="@{/logout}" sec:authorize="isAuthenticated()">Salir</a>
    </div>
</nav>

<div class="container">
    <h1>Bolsa de Empleo</h1>
    <p class="subtitle">Últimos 5 puestos públicos</p>

    <div class="grid">
        <div class="card" th:each="p : ${puestos}">
            <div class="company" th:text="${p.empresa.nombre}"></div>
            <div class="desc" th:text="${#strings.abbreviate(p.descripcion, 50)}"></div>
            <span class="salario"
                  th:text="${p.moneda.codigo + ' ' + #numbers.formatDecimal(p.salario, 1, 'COMMA', 2, 'POINT')}">
            </span>
            <a class="btn-detail" th:href="@{/buscar}">Ver detalle</a>

            <div class="tooltip">
                <strong th:text="${p.descripcion}"></strong>
                <ul>
                    <li th:each="c : ${p.caracteristicas}"
                        th:text="${c.caracteristica.nombre + ' (nivel ' + c.nivelRequerido + ')'}">
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <p class="empty" th:if="${#lists.isEmpty(puestos)}">No hay puestos publicados aún.</p>
</div>

<footer>
    <strong style="color:white">Bolsa de Empleo</strong> |
    Contacto: info@bolsaempleo.local | Créditos: Equipo de desarrollo
</footer>
</body>
</html>
