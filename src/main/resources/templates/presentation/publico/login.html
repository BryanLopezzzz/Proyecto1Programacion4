<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Bolsa de Empleo</title>
    <link rel="stylesheet" href="/css/estilos.css" th:href="@{/css/estilos.css}"/>
</head>
<body class="centered">
<div class="auth-box narrow">
    <div class="logo">🏢 BolsaEmpleo</div>
    <div class="logo-sub">Inicia sesión en tu cuenta</div>

    <div class="alert-error" th:if="${error}" th:text="${error}"></div>
    <div class="alert-success" th:if="${param.registrado}">
        Registro exitoso. Espere la aprobación del administrador.
    </div>

    <form method="post" th:action="@{/login}">
        <label>Usuario (correo)</label>
        <input type="email" name="correo" required placeholder="correo@ejemplo.com" autofocus/>
        <label>Contraseña</label>
        <input type="password" name="clave" required placeholder="••••••••"/>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:24px">Entrar</button>
    </form>

    <div class="auth-links" style="margin-top:20px">
        <a th:href="@{/registro/empresa}">Registrar Empresa</a>
        <span class="divider">|</span>
        <a th:href="@{/registro/oferente}">Registrar Oferente</a>
        <br><br>
        <a th:href="@{/}">← Volver al inicio</a>
    </div>
</div>
</body>
</html>
