<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro Empresa - Bolsa de Empleo</title>
    <link rel="stylesheet" href="/css/estilos.css" th:href="@{/css/estilos.css}"/>
</head>
<body class="centered">
<div class="auth-box">
    <h2 style="text-align:center;margin-bottom:22px">Registro de Empresa</h2>

    <div class="alert-error" th:if="${errorGeneral}" th:text="${errorGeneral}"></div>

    <form method="post" th:action="@{/registro/empresa}">
        <label>Nombre de la empresa *</label>
        <input type="text" name="nombre" placeholder="Ej: TechCorp S.A."
               th:value="${v_nombre}"/>
        <span class="field-error" th:if="${errorNombre}" th:text="${errorNombre}"></span>

        <label>Correo electrónico *</label>
        <input type="email" name="correo" placeholder="contacto@empresa.com"
               th:value="${v_correo}"/>
        <span class="field-error" th:if="${errorCorreo}" th:text="${errorCorreo}"></span>

        <label>Contraseña *</label>
        <input type="password" name="clave" placeholder="Mínimo 6 caracteres" minlength="6" required/>

        <label>Confirmar contraseña *</label>
        <input type="password" name="clave2" placeholder="Repetir contraseña" minlength="6" required/>
        <label>Localización *</label>

        <input type="text" name="localizacion" placeholder="San José, Costa Rica"
               th:value="${v_localizacion}"/>
        <span class="field-error" th:if="${errorLocalizacion}" th:text="${errorLocalizacion}"></span>

        <label>Teléfono * (XXXX XXXX)</label>
        <div style="display:flex;align-items:center;gap:8px">
            <input type="text" name="telefono" placeholder="8888 8888"
                   th:value="${v_telefono}" style="flex:1"/>
        </div>
        <span class="field-error" th:if="${errorGeneral}" th:text="${errorGeneral}"></span>

        <label>Descripción *</label>
        <textarea name="descripcion" placeholder="Descripción de la empresa..."
                  th:text="${v_descripcion}"></textarea>
        <span class="field-error" th:if="${errorDescripcion}" th:text="${errorDescripcion}"></span>

        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:22px">Registrar Empresa</button>
    </form>

    <div class="auth-links">
        <a th:href="@{/login}">Ya tengo cuenta -- Iniciar sesión</a>
    </div>
</div>
</body>
</html>
