<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro Oferente - Bolsa de Empleo</title>
    <link rel="stylesheet" href="/css/estilos.css" th:href="@{/css/estilos.css}"/>
</head>
<body class="centered">
<div class="auth-box">
    <h2 style="text-align:center;margin-bottom:22px">Registro de Oferente</h2>

    <div class="alert-error" th:if="${errorGeneral}" th:text="${errorGeneral}"></div>

    <form method="post" th:action="@{/registro/oferente}">

        <label>Identificación *</label>
        <input type="text" name="identificacion" required placeholder="Ej: 1-1234-5678"/>

        <label>Nombre *</label>
        <input type="text" name="nombre" required placeholder="Ej: Juan"/>

        <label>Primer apellido *</label>
        <input type="text" name="primerApellido" required placeholder="Ej: Pérez"/>

        <label>Nacionalidad *</label>
        <input type="text" name="nacionalidad" required placeholder="Ej: Costarricense"/>

        <label>Lugar de residencia *</label>
        <input type="text" name="residencia" required placeholder="Ej: San José, Costa Rica"/>

        <label>Teléfono * (+506 XXXX XXXX)</label>
        <input type="text" name="telefono" required placeholder="+506 8888 8888"/>

        <label>Correo electrónico *</label>
        <input type="email" name="correo" required placeholder="correo@ejemplo.com"/>

        <label>Contraseña *</label>
        <input type="password" name="clave" required minlength="6" placeholder="Mínimo 6 caracteres"/>

        <label>Confirmar contraseña *</label>
        <input type="password" name="clave2" required minlength="6" placeholder="Repetir contraseña"/>
        <span class="field-error" th:if="${errorClave}" th:text="${errorClave}"></span>

        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:22px">Registrar Oferente</button>
    </form>

    <div class="auth-links">
        <a th:href="@{/login}">Ya tengo cuenta → Iniciar sesión</a>
    </div>
</div>
</body>
</html>
