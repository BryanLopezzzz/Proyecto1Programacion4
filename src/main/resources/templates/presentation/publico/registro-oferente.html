<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro Oferente - Bolsa de Empleo</title>
    <link rel="stylesheet" href="/css/estilos.css" th:href="@{/css/estilos.css}"/>
</head>
<body class="centered">
<div class="auth-box">
    <h2 style="text-align:center;margin-bottom:22px">Registro de Oferente</h2>

    <div class="alert-error" th:if="${errorGeneral}" th:text="${errorGeneral}"></div>

    <form method="post" th:action="@{/registro/oferente}">

        <label>Tipo de identificación *</label>
        <select name="tipoIdentificacion" required>
            <option value="">-- Seleccione --</option>
            <option value="NACIONAL" th:selected="${tipoIdentificacion == 'NACIONAL'}">Nacional (costarricense)</option>
            <option value="EXTRANJERO" th:selected="${tipoIdentificacion == 'EXTRANJERO'}">Extranjero</option>
        </select>

        <label>Identificación *</label>
        <input type="text" name="identificacion" placeholder="Ej: 1-1234-5678 (Nacional)"
               th:value="${v_identificacion}"/>
        <span class="field-error" th:if="${errorIdentificacion}" th:text="${errorIdentificacion}"></span>

        <label>Nombre *</label>
        <input type="text" name="nombre" placeholder="Ej: Juan"
               th:value="${v_nombre}"/>
        <span class="field-error" th:if="${errorNombre}" th:text="${errorNombre}"></span>

        <label>Primer apellido *</label>
        <input type="text" name="primerApellido" placeholder="Ej: Pérez"
               th:value="${v_primerApellido}"/>
        <span class="field-error" th:if="${errorApellido}" th:text="${errorApellido}"></span>

        <label>Nacionalidad *</label>
        <input type="text" name="nacionalidad" placeholder="Ej: Costarricense"
               th:value="${v_nacionalidad}"/>

        <label>Lugar de residencia *</label>
        <input type="text" name="residencia" placeholder="Ej: San José, Costa Rica"
               th:value="${v_residencia}"/>

        <label>Teléfono * (XXXX XXXX)</label>
        <div style="display:flex;align-items:center;gap:8px">
            <span style="font-weight:600;color:#4c0519;font-size:14px">+506</span>
            <input type="text" name="telefono" placeholder="8888 8888"
                   th:value="${v_telefono}" style="flex:1"/>
        </div>
        <span class="field-error" th:if="${errorTelefono}" th:text="${errorTelefono}"></span>

        <label>Correo electrónico *</label>
        <input type="email" name="correo" placeholder="correo@ejemplo.com"
               th:value="${v_correo}"/>

        <label>Contraseña *</label>
        <input type="password" name="clave" placeholder="Mínimo 6 caracteres"/>

        <label>Confirmar contraseña *</label>
        <input type="password" name="clave2" placeholder="Repetir contraseña"/>
        <span class="field-error" th:if="${errorClave}" th:text="${errorClave}"></span>

        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:22px">Registrar Oferente</button>
    </form>

    <div class="auth-links">
        <a th:href="@{/login}">Ya tengo cuenta -- Iniciar sesión</a>
    </div>
</div>
</body>
</html>
